<!doctype html>
<html lang="es-CL">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="description" content="Solicitud recibida por Lux Render.">
  <title>Solicitud recibida | Lux Render</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="brand.css?v=7" data-lux-brand="true">
  <link rel="stylesheet" href="polish.css?v=4" data-lux-polish="true">
  <style>
    .thanks-hero{min-height:70vh;display:grid;place-items:center;text-align:center;padding:90px 0 50px}.thanks-card{max-width:760px;padding:clamp(28px,6vw,58px);border:1px solid rgba(142,238,255,.18);border-radius:42px;background:radial-gradient(circle at 22% 0%,rgba(142,238,255,.15),transparent 20rem),linear-gradient(145deg,rgba(255,255,255,.085),rgba(255,255,255,.028));box-shadow:0 34px 110px rgba(0,0,0,.42),inset 0 1px 0 rgba(255,255,255,.07)}.thanks-card h1{font-size:clamp(42px,6vw,78px);margin-bottom:18px}.thanks-card p{color:var(--muted);font-size:18px;max-width:610px;margin:0 auto 28px}.thanks-actions{display:flex;justify-content:center;gap:12px;flex-wrap:wrap}.thanks-proof{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:28px auto 0;max-width:620px}.thanks-proof span{padding:13px;border:1px solid rgba(255,255,255,.1);border-radius:18px;background:rgba(0,0,0,.18);color:#dce6ee;font-size:13px;font-weight:850}@media(max-width:640px){.thanks-card{border-radius:28px}.thanks-proof{grid-template-columns:1fr}.thanks-actions .btn{width:100%}}
  </style>
</head>
<body>
  <div class="noise"></div>
  <div class="site-shell">
    <header class="nav"></header>
    <main>
      <section class="thanks-hero">
        <div class="thanks-card neural-wave">
          <span class="section-kicker">Solicitud recibida</span>
          <h1>Perfecto. Ya tenemos tu ruta para revisar.</h1>
          <p>Te responderemos con una lectura clara: dónde se pierde la oportunidad, qué activo conviene construir primero y cuál sería el siguiente paso comercial.</p>
          <div class="thanks-actions">
            <a class="btn primary large" href="https://www.instagram.com/luxrender.ai/" target="_blank" rel="noopener">Ver Instagram</a>
            <a class="btn secondary large" href="./">Volver al inicio</a>
          </div>
          <div class="thanks-proof" aria-label="Qué revisaremos">
            <span>Claridad de oferta</span>
            <span>Confianza visual</span>
            <span>Ruta a consulta</span>
          </div>
        </div>
      </section>
    </main>
    <footer class="footer"></footer>
  </div>
  <script src="app.js?v=8"></script>
</body>
</html>
